name: Regression Pipeline

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  regression:
    name: Run Regression Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run regression tests with Mochawesome report
        run: npm run test:regression:report

      - name: Upload Cypress Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-regression-artifacts
          path: |
            cypress/screenshots
            cypress/videos
            cypress/reports/html
            cypress/reports/report.json