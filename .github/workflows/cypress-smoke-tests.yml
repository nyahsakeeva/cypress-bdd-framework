name: Daily Smoke Tests

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  smoke:
    name: Run Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests with Mochawesome report
        run: npm run test:smoke:report

      - name: Upload Cypress Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-smoke-artifacts
          path: |
            cypress/screenshots
            cypress/videos
            cypress/reports/html
            cypress/reports/report.json